name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Restore SSL Certificates
      run: |
        mkdir -p SSL
        echo "${{ secrets.SSL_KEY }}" | base64 -d > SSL/h.hony-wen.com.key
        echo "${{ secrets.SSL_BUNDLE_CRT }}" | base64 -d > SSL/h.hony-wen.com_bundle.crt
        echo "${{ secrets.SSL_BUNDLE_PEM }}" | base64 -d > SSL/h.hony-wen.com_bundle.pem
        echo "${{ secrets.SSL_CSR }}" | base64 -d > SSL/h.hony-wen.com.csr
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Build Docker image
      run: docker build -t avg-adventurer-tavern:latest .
    
    # 如果需要推送到 Docker Registry，取消下面的注释
    # - name: Push to Docker Hub
    #   run: |
    #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
    #     docker tag avg-adventurer-tavern:latest ${{ secrets.DOCKER_USERNAME }}/avg-adventurer-tavern:latest
    #     docker push ${{ secrets.DOCKER_USERNAME }}/avg-adventurer-tavern:latest
    
    - name: Clean up SSL files
      if: always()
      run: rm -rf SSL/