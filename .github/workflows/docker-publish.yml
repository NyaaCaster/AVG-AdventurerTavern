name: Docker Build and Push

on:
  push:
    branches: [main, master]
    tags: [v*]
  workflow_dispatch:

env:
  IMAGE_NAME: honywen/adv-tavern

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Restore SSL Certificates
        run: |
          mkdir -p SSL
          echo "${{ secrets.SSL_KEY }}" | base64 -d > SSL/h.hony-wen.com.key
          echo "${{ secrets.SSL_BUNDLE_CRT }}" | base64 -d > SSL/h.hony-wen.com_bundle.crt
          echo "${{ secrets.SSL_BUNDLE_PEM }}" | base64 -d > SSL/h.hony-wen.com_bundle.pem
          echo "${{ secrets.SSL_CSR }}" | base64 -d > SSL/h.hony-wen.com.csr

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Clean up SSL files
        if: always()
        run: rm -rf SSL/

      - name: Summary
        run: |
          echo "✅ Built and pushed image: ${{ env.IMAGE_NAME }}"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
          echo "🏗️ Platforms: linux/amd64, linux/arm64"
          echo "🔗 https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
          echo "📦 Full-stack image: Frontend (Nginx) + Backend (Node.js + SQLite)"
          echo "🔒 Security scan completed"
          echo "🔐 SSL certificates restored from secrets"

