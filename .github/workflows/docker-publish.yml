name: Docker Build and Push - Client Only

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'database-server/**'
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

env:
  IMAGE_NAME: honywen/adv-tavern

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 只获取最新 commit，足够获取 hash

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Get commit hash
        id: git
        run: echo "hash=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            VITE_QWEATHER_HOST=${{ secrets.QWEATHER_HOST }}
            VITE_QWEATHER_KEY=${{ secrets.QWEATHER_KEY }}
            FILE_SERVER_API_KEY=${{ secrets.FILE_SERVER_API_KEY }}
            GIT_COMMIT_HASH=${{ steps.git.outputs.hash }}
          secrets: |
            ssl_cert=${{ secrets.SSL_CERTIFICATE_CRT }}
            ssl_key=${{ secrets.SSL_CERTIFICATE_KEY }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Summary
        run: |
          echo "✅ Built and pushed image: ${{ env.IMAGE_NAME }}"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
          echo "🏗️ Platforms: linux/amd64, linux/arm64"
          echo "🔗 https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
          echo "📦 Client-only image: Frontend static files (Nginx)"
          echo "🔒 Security scan completed"
          echo "🔐 SSL certificates embedded in image"
          echo "🌐 HTTPS enabled on port 3096"
          echo "ℹ️  Database server is deployed separately from database-server/ directory"

