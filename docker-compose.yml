services:
  client:
    image: ${PRIVATE_DOCKER_REGISTRY_HOST:?PRIVATE_DOCKER_REGISTRY_HOST is required}/adv-tavern:latest
    container_name: adventurertavern
    pull_policy: always
    privileged: true
    ports:
      - "3098:80"
      - "3096:443"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --no-check-certificate https://host.docker.internal:3096/health || wget --no-verbose --tries=1 --spider http://host.docker.internal:3098/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "adventurertavern-client"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
