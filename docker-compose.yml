version: '3.8'

services:
  adventurertavern:
    image: honywen/adv-tavern:latest
    container_name: adventurertavern
    pull_policy: always
    ports:
      - "3098:443"
      - "3097:3097"
    volumes:
      - ./data:/app/data
      - ./SSL:/etc/nginx/ssl:ro
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost:443/health", "--no-check-certificate"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "adventurertavern-fullstack"
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run

networks:
  app-network:
    driver: bridge